# Config do daemon watchdog do Debian para o connectivity-watchdog.
# Alimenta o /dev/watchdog e roda os scripts de /etc/watchdog.d/.

watchdog-device = /dev/watchdog

# HW reinicia se nao alimentado por 15s
watchdog-timeout = 15

# alimenta + roda os testes a cada 10s
interval        = 10

test-directory  = /etc/watchdog.d

# tempo max. de um script test/repair
test-timeout    = 10
repair-timeout  = 10

realtime        = yes
priority        = 1
log-dir         = /var/log/watchdog
